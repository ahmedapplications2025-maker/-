<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم | نظام الحماية</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #070b12;
      --surface: #0d1420;
      --surface2: #111b2d;
      --border: #1a2840;
      --accent: #00c8ff;
      --accent2: #e63946;
      --accent-dim: rgba(0,200,255,0.1);
      --green: #00ff9d;
      --green-dim: rgba(0,255,157,0.1);
      --text: #d4e6ff;
      --muted: #4a6080;
      --warn: #ffb347;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      grid-template-rows: 56px 1fr;
      overflow-x: hidden;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,200,255,0.015) 2px, rgba(0,200,255,0.015) 4px);
      pointer-events: none;
      z-index: 9999;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: logoBlink 3s ease-in-out infinite;
    }

    @keyframes logoBlink { 0%,90%,100% { opacity:1; } 95% { opacity:0.1; } }

    .header-status { display: flex; align-items: center; gap: 6px; font-size: 12px; }

    .hbadge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      border: 1px solid;
    }

    .hbadge.offline  { border-color: var(--muted); color: var(--muted); }
    .hbadge.online   { border-color: var(--green); color: var(--green); background: var(--green-dim); }
    .hbadge.streaming{ border-color: var(--accent2); color: var(--accent2); background: rgba(230,57,70,0.1); animation: stream-blink 1.2s ease-in-out infinite; }

    @keyframes stream-blink { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

    .time-display { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--muted); }

    main {
      display: grid;
      grid-template-columns: 320px 1fr;
      height: calc(100vh - 56px);
      overflow: hidden;
    }

    .sidebar {
      background: var(--surface);
      border-left: 1px solid var(--border);
      padding: 20px 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .tile {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }

    .tile-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .tile-row:last-child { margin-bottom: 0; }

    .tile-label {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .indicator {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
    }

    .indicator.on  { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .indicator.red { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); animation: blink 0.8s infinite; }

    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.2;} }

    .tile-value { font-size: 12px; font-weight: 600; color: var(--text); font-family: 'JetBrains Mono', monospace; }

    /* ── قائمة الكاميرات ── */
    .cam-list { display: flex; flex-direction: column; gap: 8px; }

    .cam-item {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .cam-item.selected {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .cam-item-left { display: flex; align-items: center; gap: 10px; }
    .cam-item-id { font-size: 12px; font-family: 'JetBrains Mono', monospace; color: var(--text); }
    .cam-item-ua { font-size: 10px; color: var(--muted); margin-top: 2px; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; direction: ltr; }

    .cam-badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 20px;
      border: 1px solid;
      white-space: nowrap;
    }

    .cam-badge.on  { border-color: var(--green); color: var(--green); }
    .cam-badge.off { border-color: var(--muted); color: var(--muted); }

    .no-cams {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      padding: 20px 0;
      font-family: 'JetBrains Mono', monospace;
    }

    /* اختيار الكاميرا */
    .face-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 4px;
    }

    .face-opt {
      padding: 10px 8px;
      border-radius: 9px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'Cairo', sans-serif;
      font-size: 12px;
      cursor: pointer;
      text-align: center;
    }

    .face-opt.active { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }

    /* أزرار */
    .btn {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: none;
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-start { background: linear-gradient(135deg,#00a8d4,#00c8ff); color: #000; box-shadow: 0 4px 20px rgba(0,200,255,0.3); }
    .btn-start:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-stop  { background: var(--surface2); color: var(--accent2); border: 1.5px solid var(--accent2); }
    .btn-stop:disabled { opacity: 0.3; cursor: not-allowed; }

    /* سجل */
    .log-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.9;
      max-height: 160px;
      overflow-y: auto;
      direction: rtl;
    }

    .log-box .ok   { color: var(--green); }
    .log-box .warn { color: var(--accent2); }
    .log-box .info { color: var(--accent); }
    .log-entry { animation: fadeUp 0.3s ease; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(3px); } to { opacity:1; transform:translateY(0); } }

    /* منطقة الفيديو */
    .main-view {
      display: flex;
      flex-direction: column;
      background: #040810;
      position: relative;
      overflow: hidden;
    }

    .video-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .corner { position: absolute; width: 20px; height: 20px; border-color: var(--accent); border-style: solid; opacity: 0.5; z-index: 2; }
    .corner.tl { top:16px; right:16px; border-width:2px 0 0 2px; }
    .corner.tr { top:16px; left:16px;  border-width:2px 2px 0 0; }
    .corner.bl { bottom:16px; right:16px; border-width:0 0 2px 2px; }
    .corner.br { bottom:16px; left:16px;  border-width:0 2px 2px 0; }

    .grid-overlay {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(0,200,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,200,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 1;
    }

    #remoteVideo { width:100%; height:100%; object-fit:cover; display:none; }
    #remoteVideo.visible { display:block; }

    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--muted);
    }

    .placeholder svg { width:64px; height:64px; opacity:0.3; }
    .placeholder p { font-size:13px; font-family:'JetBrains Mono',monospace; letter-spacing:1px; }

    .bottom-bar {
      height: 44px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    .bottom-bar span { display:flex; align-items:center; gap:6px; }

    .rec-badge {
      display: none;
      align-items: center;
      gap: 5px;
      background: rgba(230,57,70,0.15);
      border: 1px solid var(--accent2);
      border-radius: 20px;
      padding: 3px 10px;
      color: var(--accent2);
      font-size: 11px;
      animation: stream-blink 1s infinite;
    }

    .rec-badge.visible { display:flex; }
    .rec-dot { width:6px; height:6px; border-radius:50%; background:var(--accent2); }

    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

    @media (max-width: 700px) {
      main { grid-template-columns:1fr; grid-template-rows:1fr auto; }
      .main-view { order:-1; min-height:260px; }
      .sidebar { max-height:60vh; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo"><div class="logo-dot"></div>RIYADH · SECURITY</div>
    <div class="header-status">
      <span class="hbadge offline" id="deviceBadge">لا يوجد جهاز</span>
      <span class="hbadge offline" id="streamBadge">لا يوجد بث</span>
    </div>
    <div class="time-display" id="clockEl">00:00:00</div>
  </header>

  <main>

    <aside class="sidebar">

      <!-- قائمة الأجهزة المتصلة -->
      <div>
        <div class="section-title">الأجهزة المتصلة</div>
        <div class="cam-list" id="camList">
          <div class="no-cams">لا يوجد أجهزة متصلة</div>
        </div>
      </div>

      <!-- حالة الجهاز المختار -->
      <div>
        <div class="section-title">حالة الجهاز المختار</div>
        <div class="tile">
          <div class="tile-row">
            <span class="tile-label"><span class="indicator" id="i_device"></span> الجهاز</span>
            <span class="tile-value" id="v_device">—</span>
          </div>
          <div class="tile-row">
            <span class="tile-label"><span class="indicator" id="i_camera"></span> الكاميرا</span>
            <span class="tile-value" id="v_camera">متوقفة</span>
          </div>
          <div class="tile-row">
            <span class="tile-label"><span class="indicator" id="i_conn"></span> الاتصال</span>
            <span class="tile-value" id="v_conn">منقطع</span>
          </div>
        </div>
      </div>

      <!-- اختيار الكاميرا -->
      <div>
        <div class="section-title">الكاميرا</div>
        <div class="tile">
          <p class="tile-label" style="margin-bottom:10px">اختر الكاميرا</p>
          <div class="face-group">
            <button class="face-opt active" id="fo_front" onclick="selectFace('user')">📱 أمامية</button>
            <button class="face-opt" id="fo_back"  onclick="selectFace('environment')">📷 خلفية</button>
          </div>
        </div>
      </div>

      <!-- أزرار التحكم -->
      <div>
        <div class="section-title">التحكم</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          <button class="btn btn-start" id="btnStart" onclick="sendStart()" disabled>▶ تشغيل الكاميرا</button>
          <button class="btn btn-stop"  id="btnStop"  onclick="sendStop()"  disabled>■ إيقاف الكاميرا</button>
        </div>
      </div>

      <!-- السجل -->
      <div>
        <div class="section-title">سجل الأحداث</div>
        <div class="log-box" id="logBox"></div>
      </div>

    </aside>

    <!-- منطقة الفيديو -->
    <section class="main-view">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <div class="grid-overlay"></div>
      <div class="video-wrapper">
        <div class="placeholder" id="placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/>
            <line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/>
            <line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/>
          </svg>
          <p>اختر جهازاً لبدء المشاهدة</p>
        </div>
        <video id="remoteVideo" autoplay playsinline></video>
      </div>
      <div class="bottom-bar">
        <span><span class="rec-badge" id="recBadge"><span class="rec-dot"></span> LIVE</span></span>
        <span id="statusBar">جاهز للمراقبة</span>
        <span id="resInfo">—</span>
      </div>
    </section>

  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, remove, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "create-61c4f.firebaseapp.com",
      databaseURL: "https://create-61c4f-default-rtdb.firebaseio.com",
      projectId: "create-61c4f",
      storageBucket: "create-61c4f.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);

    let pc = null;
    let selectedFace = 'user';
    let streaming = false;
    let activeDeviceId = null;   // الجهاز المختار حالياً
    let deviceUnsubs = [];       // للإلغاء عند تغيير الجهاز

    // ── ساعة ──
    setInterval(() => {
      document.getElementById('clockEl').textContent =
        new Date().toLocaleTimeString('ar-EG', { hour12: false });
    }, 1000);

    // ── لوج ──
    const logBox = document.getElementById('logBox');
    function log(msg, type = '') {
      const t = new Date().toLocaleTimeString('ar-EG');
      logBox.innerHTML = `<div class="log-entry ${type}">[${t}] ${msg}</div>` + logBox.innerHTML;
    }

    function setIndicator(id, cls, val) {
      document.getElementById('i_' + id).className = 'indicator ' + cls;
      document.getElementById('v_' + id).textContent = val;
    }

    function setStreamUI(on) {
      streaming = on;
      const rv  = document.getElementById('remoteVideo');
      const ph  = document.getElementById('placeholder');
      const rec = document.getElementById('recBadge');
      const sb  = document.getElementById('streamBadge');

      rv.classList.toggle('visible', on);
      ph.style.display = on ? 'none' : 'flex';
      rec.classList.toggle('visible', on);
      sb.textContent = on ? '● بث مباشر' : 'لا يوجد بث';
      sb.className   = on ? 'hbadge streaming' : 'hbadge offline';

      document.getElementById('btnStart').disabled = on || !activeDeviceId;
      document.getElementById('btnStop').disabled  = !on;
      setIndicator('camera', on ? 'red' : '', on ? 'تعمل 🔴' : 'متوقفة');
      setIndicator('conn',   on ? 'on'  : '', on ? 'متصل'    : 'منقطع');
      document.getElementById('statusBar').textContent = on ? 'بث مباشر نشط' : 'جاهز للمراقبة';
    }

    // ── اختيار الكاميرا (أمامية / خلفية) ──
    window.selectFace = function(face) {
      selectedFace = face;
      document.getElementById('fo_front').classList.toggle('active', face === 'user');
      document.getElementById('fo_back').classList.toggle('active',  face === 'environment');
    };

    // ── اختيار جهاز من القائمة ──
    window.selectDevice = function(deviceId) {
      if (activeDeviceId === deviceId) return;

      // إذا كان في بث نشط، أوقفه أولاً
      if (streaming) sendStop();

      // إلغاء الاشتراكات القديمة
      deviceUnsubs.forEach(u => u());
      deviceUnsubs = [];

      activeDeviceId = deviceId;

      // تحديث UI
      document.querySelectorAll('.cam-item').forEach(el => {
        el.classList.toggle('selected', el.dataset.id === deviceId);
      });

      const camBase = `cameras/${deviceId}`;
      const rtcBase = `webrtc/${deviceId}`;

      // راقب حالة الجهاز
      const u1 = onValue(ref(db, `${camBase}/info`), snap => {
        const d  = snap.val();
        const on = d && d.online;
        document.getElementById('deviceBadge').textContent = on ? 'الجهاز متصل' : 'الجهاز غير متصل';
        document.getElementById('deviceBadge').className   = on ? 'hbadge online' : 'hbadge offline';
        setIndicator('device', on ? 'on' : '', on ? 'متصل ✓' : 'غير متصل');
        document.getElementById('btnStart').disabled = !on || streaming;
        if (on) log(`📲 تم اختيار الجهاز: ${deviceId}`, 'ok');
      });

      // راقب حالة الكاميرا
      const u2 = onValue(ref(db, `${camBase}/status`), snap => {
        const s = snap.val();
        if (s && !s.active) setStreamUI(false);
      });

      // استقبال العرض (offer) عند بدء البث
      const u3 = onValue(ref(db, `${rtcBase}/offer`), async snap => {
        if (!snap.val()) return;
        const offer = snap.val();
        if (pc) { pc.close(); pc = null; }

        log('📡 تم استلام العرض من الكاميرا', 'info');

        pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });

        pc.ontrack = e => {
          const rv = document.getElementById('remoteVideo');
          if (rv.srcObject !== e.streams[0]) {
            rv.srcObject = e.streams[0];
            setStreamUI(true);
            log('✅ بث الكاميرا يعمل', 'ok');
            const track = e.streams[0].getVideoTracks()[0];
            if (track) {
              const s = track.getSettings();
              if (s.width) document.getElementById('resInfo').textContent = `${s.width}×${s.height}`;
            }
          }
        };

        const iceCandidates = [];
        pc.onicecandidate = e => { if (e.candidate) iceCandidates.push(e.candidate.toJSON()); };
        pc.onicegatheringstatechange = async () => {
          if (pc.iceGatheringState === 'complete')
            await set(ref(db, `${rtcBase}/ice_admin`), iceCandidates);
        };
        pc.oniceconnectionstatechange = () => {
          const s = pc.iceConnectionState;
          if (['disconnected','failed','closed'].includes(s)) {
            setStreamUI(false);
            log('⚠ انقطع الاتصال: ' + s, 'warn');
          }
        };

        await pc.setRemoteDescription(new RTCSessionDescription(offer));
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        await set(ref(db, `${rtcBase}/answer`), { sdp: answer.sdp, type: answer.type });
        log('📨 تم إرسال الرد للكاميرا', 'info');

        onValue(ref(db, `${rtcBase}/ice_camera`), async snap2 => {
          if (!snap2.val() || !pc) return;
          for (const c of snap2.val())
            try { await pc.addIceCandidate(new RTCIceCandidate(c)); } catch(e) {}
        });
      });

      deviceUnsubs = [u1, u2, u3];
      log(`🎯 تم تحديد الجهاز: ${deviceId}`, 'info');
    };

    // ── أوامر التشغيل / الإيقاف ──
    window.sendStart = async function() {
      if (!activeDeviceId) return;
      document.getElementById('btnStart').disabled = true;
      await set(ref(db, `cameras/${activeDeviceId}/command`), {
        action: 'start', face: selectedFace, ts: serverTimestamp()
      });
      log('▶ تم إرسال أمر التشغيل', 'info');
    };

    window.sendStop = async function() {
      if (!activeDeviceId) return;
      await set(ref(db, `cameras/${activeDeviceId}/command`), { action: 'stop', ts: serverTimestamp() });
      await remove(ref(db, `webrtc/${activeDeviceId}/offer`));
      await remove(ref(db, `webrtc/${activeDeviceId}/answer`));
      await remove(ref(db, `webrtc/${activeDeviceId}/ice_camera`));
      await remove(ref(db, `webrtc/${activeDeviceId}/ice_admin`));
      if (pc) { pc.close(); pc = null; }
      setStreamUI(false);
      log('⏹ تم إرسال أمر الإيقاف', 'warn');
    };

    // ── مراقبة قائمة الأجهزة كلها ──
    onValue(ref(db, 'cameras'), snap => {
      const data = snap.val();
      const listEl = document.getElementById('camList');

      if (!data) {
        listEl.innerHTML = '<div class="no-cams">لا يوجد أجهزة متصلة</div>';
        return;
      }

      const devices = Object.entries(data);
      listEl.innerHTML = '';

      devices.forEach(([id, info]) => {
        const online = info.info && info.info.online;
        const ua     = (info.info && info.info.ua) ? info.info.ua : '';
        const isSelected = id === activeDeviceId;

        const item = document.createElement('div');
        item.className = `cam-item${isSelected ? ' selected' : ''}`;
        item.dataset.id = id;
        item.onclick = () => selectDevice(id);
        item.innerHTML = `
          <div class="cam-item-left">
            <div class="indicator ${online ? 'on' : ''}"></div>
            <div>
              <div class="cam-item-id">${id}</div>
              <div class="cam-item-ua">${ua || '—'}</div>
            </div>
          </div>
          <span class="cam-badge ${online ? 'on' : 'off'}">${online ? 'متصل' : 'أوفلاين'}</span>
        `;
        listEl.appendChild(item);
      });
    });

    log('🔌 لوحة التحكم جاهزة', 'info');
    setIndicator('device', '', '—');
    setIndicator('camera', '', 'متوقفة');
    setIndicator('conn',   '', 'منقطع');
  </script>
</body>
</html>
