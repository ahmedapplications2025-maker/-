<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>حماية | كاميرا الأمان</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --accent: #e63946;
      --accent-dim: rgba(230,57,70,0.15);
      --text: #e8e8f0;
      --muted: #555570;
      --green: #2ec4b6;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px 24px;
      max-width: 480px;
      width: 100%;
    }

    .camera-icon {
      width: 90px; height: 90px;
      margin: 0 auto 28px;
      position: relative;
    }

    .ring {
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      opacity: 0;
    }

    .ring.active { animation: pulse-ring 2s ease-out infinite; }

    @keyframes pulse-ring {
      0% { transform: scale(0.85); opacity: 0.6; }
      100% { transform: scale(1.4); opacity: 0; }
    }

    .icon-circle {
      width: 90px; height: 90px;
      border-radius: 50%;
      background: var(--accent-dim);
      border: 1.5px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    h1 { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 10px; }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.8;
      margin-bottom: 28px;
    }

    .device-id-badge {
      font-size: 11px;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      margin-bottom: 20px;
      letter-spacing: 1px;
      font-family: monospace;
      direction: ltr;
    }

    .device-id-badge span { color: var(--accent); }

    .status-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .status-label {
      font-size: 13px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    .dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .dot.active-cam { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: blink 1s ease-in-out infinite; }

    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

    .status-value { font-size: 13px; font-weight: 600; color: var(--text); }

    .divider { height: 1px; background: var(--border); margin: 16px 0; }

    .admin-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: 1.5px solid var(--accent);
      background: var(--accent-dim);
      color: var(--text);
      font-family: 'Cairo', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
    }

    .admin-btn:active { opacity: 0.8; }

    .footer {
      position: fixed;
      bottom: 24px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      z-index: 1;
    }

    .footer span { color: var(--accent); }
  </style>
</head>
<body>

  <div class="container">

    <div class="camera-icon">
      <div class="ring" id="ring"></div>
      <div class="icon-circle">
        <svg viewBox="0 0 24 24" fill="none" stroke="#e63946" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="40" height="40">
          <path d="M23 7l-7 5 7 5V7z"/>
          <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
        </svg>
      </div>
    </div>

    <h1>هذه كاميرا للحماية من السرقة</h1>
    <p class="subtitle">
      هذا الجهاز مرتبط بنظام المراقبة<br>
      الكاميرا تعمل عند صدور أمر من لوحة التحكم
    </p>

    <div class="device-id-badge">DEVICE ID: <span id="deviceIdLabel">...</span></div>

    <div class="status-card">
      <div class="status-row">
        <span class="status-label"><span class="dot" id="connDot"></span> الاتصال بالخادم</span>
        <span class="status-value" id="connStatus">جاري الاتصال...</span>
      </div>
      <div class="divider"></div>
      <div class="status-row">
        <span class="status-label"><span class="dot" id="camDot"></span> الكاميرا</span>
        <span class="status-value" id="camStatus">متوقفة</span>
      </div>
      <div class="divider"></div>
      <div class="status-row">
        <span class="status-label">🎥 الكاميرا المستخدمة</span>
        <span class="status-value" id="camFaceLabel">—</span>
      </div>
    </div>

    <a class="admin-btn" href="admin.html" target="_blank">🖥 فتح لوحة التحكم</a>

  </div>

  <div class="footer">نظام الأمان · <span>RIYADH</span> · حماية متكاملة</div>

  <video id="localVideo" style="display:none;position:fixed;top:-9999px;left:-9999px;" autoplay playsinline muted></video>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, remove, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "create-61c4f.firebaseapp.com",
      databaseURL: "https://create-61c4f-default-rtdb.firebaseio.com",
      projectId: "create-61c4f",
      storageBucket: "create-61c4f.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);

    // ── ID فريد لكل جهاز، يثبت طول الجلسة ──
    let DEVICE_ID = sessionStorage.getItem('cam_device_id');
    if (!DEVICE_ID) {
      DEVICE_ID = 'cam_' + Math.random().toString(36).slice(2, 8).toUpperCase();
      sessionStorage.setItem('cam_device_id', DEVICE_ID);
    }
    document.getElementById('deviceIdLabel').textContent = DEVICE_ID;

    // مسارات خاصة بهذا الجهاز فقط
    const camBase = `cameras/${DEVICE_ID}`;
    const rtcBase = `webrtc/${DEVICE_ID}`;

    let pc = null;
    let localStream = null;
    let currentFace = 'user';

    const ring         = document.getElementById('ring');
    const connDot      = document.getElementById('connDot');
    const camDot       = document.getElementById('camDot');
    const connStatus   = document.getElementById('connStatus');
    const camStatus    = document.getElementById('camStatus');
    const camFaceLabel = document.getElementById('camFaceLabel');
    const localVideo   = document.getElementById('localVideo');

    async function startCamera(face) {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: face }, audio: false });
        localVideo.srcObject = localStream;
        camDot.className = 'dot active-cam';
        camStatus.textContent = 'تعمل الآن 🔴';
        camFaceLabel.textContent = face === 'user' ? 'أمامية' : 'خلفية';
        ring.classList.add('active');
        await set(ref(db, `${camBase}/status`), { active: true, face, ts: serverTimestamp() });
        return localStream;
      } catch (e) {
        camStatus.textContent = 'فشل التشغيل';
        console.error('Camera error:', e);
      }
    }

    async function stopCamera() {
      if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
      localVideo.srcObject = null;
      if (pc) { pc.close(); pc = null; }
      camDot.className = 'dot';
      camStatus.textContent = 'متوقفة';
      camFaceLabel.textContent = '—';
      ring.classList.remove('active');
      await set(ref(db, `${camBase}/status`), { active: false, ts: serverTimestamp() });
      await remove(ref(db, `${rtcBase}/offer`));
      await remove(ref(db, `${rtcBase}/answer`));
      await remove(ref(db, `${rtcBase}/ice_camera`));
    }

    async function createOffer() {
      if (pc) { pc.close(); pc = null; }
      const stream = localStream || await startCamera(currentFace);
      if (!stream) return;

      pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
      stream.getTracks().forEach(t => pc.addTrack(t, stream));

      const iceCandidates = [];
      pc.onicecandidate = e => { if (e.candidate) iceCandidates.push(e.candidate.toJSON()); };
      pc.onicegatheringstatechange = async () => {
        if (pc.iceGatheringState === 'complete')
          await set(ref(db, `${rtcBase}/ice_camera`), iceCandidates);
      };
      pc.oniceconnectionstatechange = () => {
        if (['disconnected','failed','closed'].includes(pc.iceConnectionState)) stopCamera();
      };

      const offer = await pc.createOffer({ offerToReceiveVideo: false });
      await pc.setLocalDescription(offer);
      await set(ref(db, `${rtcBase}/offer`), { sdp: offer.sdp, type: offer.type });

      onValue(ref(db, `${rtcBase}/answer`), async snap => {
        if (!snap.val() || !pc) return;
        if (pc.signalingState === 'have-local-offer')
          await pc.setRemoteDescription(new RTCSessionDescription(snap.val()));
      });

      onValue(ref(db, `${rtcBase}/ice_admin`), async snap => {
        if (!snap.val() || !pc) return;
        for (const c of snap.val()) try { await pc.addIceCandidate(new RTCIceCandidate(c)); } catch(e) {}
      });
    }

    // ── استمع فقط للأوامر الموجهة لهذا الجهاز ──
    onValue(ref(db, `${camBase}/command`), async snap => {
      connDot.className = 'dot connected';
      connStatus.textContent = 'متصل ✓';
      const cmd = snap.val();
      if (!cmd) return;
      if (cmd.action === 'start') {
        currentFace = cmd.face || currentFace;
        if (!localStream) await startCamera(currentFace);
        await createOffer();
      } else if (cmd.action === 'stop') {
        await stopCamera();
      }
    }, () => { connStatus.textContent = 'خطأ في الاتصال'; });

    // سجّل الجهاز متصل
    set(ref(db, `${camBase}/info`), {
      online: true,
      id: DEVICE_ID,
      ua: navigator.userAgent.slice(0, 80),
      ts: serverTimestamp()
    });

    window.addEventListener('beforeunload', () => {
      set(ref(db, `${camBase}/info`), { online: false, id: DEVICE_ID });
    });
  </script>
</body>
</html>
