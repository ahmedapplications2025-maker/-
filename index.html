<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>حماية | كاميرا الأمان</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --accent: #e63946;
      --accent-dim: rgba(230,57,70,0.15);
      --text: #e8e8f0;
      --muted: #555570;
      --green: #2ec4b6;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Subtle noise texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px 24px;
      max-width: 480px;
      width: 100%;
    }

    /* Camera Icon SVG */
    .camera-icon {
      width: 90px;
      height: 90px;
      margin: 0 auto 28px;
      position: relative;
    }

    .camera-icon svg {
      width: 100%;
      height: 100%;
    }

    /* Pulsing ring */
    .ring {
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      opacity: 0;
      animation: none;
    }

    .ring.active {
      animation: pulse-ring 2s ease-out infinite;
    }

    @keyframes pulse-ring {
      0% { transform: scale(0.85); opacity: 0.6; }
      100% { transform: scale(1.4); opacity: 0; }
    }

    .icon-circle {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: var(--accent-dim);
      border: 1.5px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.8;
      margin-bottom: 36px;
    }

    /* Status card */
    .status-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .status-label {
      font-size: 13px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: all 0.4s ease;
    }

    .dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .dot.active-cam { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: blink 1s ease-in-out infinite; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .status-value {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 16px 0;
    }

    /* Camera face selector */
    .face-btns {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .face-btn {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'Cairo', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .face-btn.selected {
      border-color: var(--accent);
      background: var(--accent-dim);
      color: var(--text);
    }

    /* Hidden video element - camera streams here but not shown to user */
    #localVideo {
      display: none !important;
      position: fixed;
      top: -9999px;
      left: -9999px;
    }

    /* Footer */
    .footer {
      position: fixed;
      bottom: 24px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      z-index: 1;
    }

    .footer span {
      color: var(--accent);
    }

    /* Log */
    .log {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 12px;
      color: var(--muted);
      text-align: right;
      line-height: 2;
      max-height: 120px;
      overflow-y: auto;
    }

    .log-entry { animation: fadeIn 0.3s ease; }
    .log-entry.warn { color: var(--accent); }
    .log-entry.ok { color: var(--green); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>

  <div class="container">

    <div class="camera-icon">
      <div class="ring" id="ring"></div>
      <div class="icon-circle">
        <svg viewBox="0 0 24 24" fill="none" stroke="#e63946" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 7l-7 5 7 5V7z"/>
          <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
        </svg>
      </div>
    </div>

    <h1>هذه كاميرا للحماية من السرقة</h1>
    <p class="subtitle">
      هذا الجهاز مرتبط بنظام المراقبة<br>
      الكاميرا تعمل عند صدور أمر من لوحة التحكم
    </p>

    <div class="status-card">
      <div class="status-row">
        <span class="status-label"><span class="dot" id="connDot"></span> الاتصال بالخادم</span>
        <span class="status-value" id="connStatus">جاري الاتصال...</span>
      </div>
      <div class="divider"></div>
      <div class="status-row">
        <span class="status-label"><span class="dot" id="camDot"></span> الكاميرا</span>
        <span class="status-value" id="camStatus">متوقفة</span>
      </div>
      <div class="divider"></div>
      <div class="status-row">
        <span class="status-label">🎥 الكاميرا المستخدمة</span>
        <span class="status-value" id="camFaceLabel">—</span>
      </div>
    </div>

    <div class="face-btns">
      <button class="face-btn selected" id="btnFront" onclick="setFace('user')">📱 أمامية</button>
      <button class="face-btn" id="btnBack" onclick="setFace('environment')">📷 خلفية</button>
    </div>

    <div style="height:16px"></div>
    <div class="log" id="log"></div>

  </div>

  <div class="footer">نظام الأمان · <span>RIYADH</span> · حماية متكاملة</div>

  <!-- Hidden video - NOT shown to user -->
  <video id="localVideo" autoplay playsinline muted></video>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    // ===== CONFIG — نفس مشروعك =====
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "create-61c4f.firebaseapp.com",
      databaseURL: "https://create-61c4f-default-rtdb.firebaseio.com",
      projectId: "create-61c4f",
      storageBucket: "create-61c4f.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };
    // ================================

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // ---- WebRTC ----
    let pc = null;
    let localStream = null;
    let currentFace = 'user'; // default front

    const ring = document.getElementById('ring');
    const connDot = document.getElementById('connDot');
    const camDot = document.getElementById('camDot');
    const connStatus = document.getElementById('connStatus');
    const camStatus = document.getElementById('camStatus');
    const camFaceLabel = document.getElementById('camFaceLabel');
    const logEl = document.getElementById('log');
    const localVideo = document.getElementById('localVideo');

    function log(msg, type = '') {
      const d = new Date().toLocaleTimeString('ar-EG');
      logEl.innerHTML = `<div class="log-entry ${type}">[${d}] ${msg}</div>` + logEl.innerHTML;
    }

    window.setFace = function(face) {
      currentFace = face;
      document.getElementById('btnFront').classList.toggle('selected', face === 'user');
      document.getElementById('btnBack').classList.toggle('selected', face === 'environment');
      // If camera already on, restart with new face
      if (localStream) {
        stopCamera().then(() => startCamera());
      }
      log(face === 'user' ? 'تم اختيار الكاميرا الأمامية' : 'تم اختيار الكاميرا الخلفية');
    };

    async function startCamera() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: currentFace },
          audio: false
        });
        localVideo.srcObject = localStream;
        camDot.className = 'dot active-cam';
        camStatus.textContent = 'تعمل الآن 🔴';
        camFaceLabel.textContent = currentFace === 'user' ? 'أمامية' : 'خلفية';
        ring.classList.add('active');
        log('✅ تم تشغيل الكاميرا', 'ok');
        await set(ref(db, 'camera/status'), { active: true, face: currentFace, ts: serverTimestamp() });
        return localStream;
      } catch (e) {
        log('❌ فشل تشغيل الكاميرا: ' + e.message, 'warn');
      }
    }

    async function stopCamera() {
      if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
        localStream = null;
        localVideo.srcObject = null;
      }
      if (pc) {
        pc.close();
        pc = null;
      }
      camDot.className = 'dot';
      camStatus.textContent = 'متوقفة';
      camFaceLabel.textContent = '—';
      ring.classList.remove('active');
      log('⏹ الكاميرا متوقفة');
      await set(ref(db, 'camera/status'), { active: false, ts: serverTimestamp() });
      await set(ref(db, 'webrtc/offer'), null);
      await set(ref(db, 'webrtc/answer'), null);
      await set(ref(db, 'webrtc/ice_camera'), null);
    }

    // ---- WebRTC signaling ----
    async function createOffer() {
      if (pc) { pc.close(); pc = null; }

      const stream = localStream || await startCamera();
      if (!stream) return;

      pc = new RTCPeerConnection({
        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
      });

      stream.getTracks().forEach(t => pc.addTrack(t, stream));

      // Collect ICE candidates
      const iceCandidates = [];
      pc.onicecandidate = e => {
        if (e.candidate) iceCandidates.push(e.candidate.toJSON());
      };

      pc.onicegatheringstatechange = async () => {
        if (pc.iceGatheringState === 'complete') {
          await set(ref(db, 'webrtc/ice_camera'), iceCandidates);
        }
      };

      const offer = await pc.createOffer({ offerToReceiveVideo: false });
      await pc.setLocalDescription(offer);
      await set(ref(db, 'webrtc/offer'), { sdp: offer.sdp, type: offer.type });
      log('📡 تم إرسال العرض للوحة التحكم', 'ok');

      // Listen for answer
      onValue(ref(db, 'webrtc/answer'), async snap => {
        if (!snap.val() || !pc) return;
        const ans = snap.val();
        if (pc.signalingState === 'have-local-offer') {
          await pc.setRemoteDescription(new RTCSessionDescription(ans));
          log('🔗 تم الاتصال بلوحة التحكم', 'ok');
        }
      });

      // Listen for admin ICE
      onValue(ref(db, 'webrtc/ice_admin'), async snap => {
        if (!snap.val() || !pc) return;
        for (const c of snap.val()) {
          try { await pc.addIceCandidate(new RTCIceCandidate(c)); } catch(e) {}
        }
      });
    }

    // ---- Main command listener ----
    connDot.className = 'dot';
    connStatus.textContent = 'جاري الاتصال...';

    const cmdRef = ref(db, 'camera/command');
    onValue(cmdRef, async snap => {
      connDot.className = 'dot connected';
      connStatus.textContent = 'متصل ✓';

      const cmd = snap.val();
      if (!cmd) return;

      if (cmd.action === 'start') {
        if (cmd.face) currentFace = cmd.face;
        document.getElementById('btnFront').classList.toggle('selected', currentFace === 'user');
        document.getElementById('btnBack').classList.toggle('selected', currentFace === 'environment');
        if (!localStream) await startCamera();
        await createOffer();
        log('▶️ أمر التشغيل من لوحة التحكم', 'ok');
      } else if (cmd.action === 'stop') {
        await stopCamera();
        log('⏹ أمر الإيقاف من لوحة التحكم', 'warn');
      }
    }, err => {
      connStatus.textContent = 'خطأ في الاتصال';
      log('❌ خطأ Firebase: ' + err.message, 'warn');
    });

    // Mark device online
    set(ref(db, 'camera/device'), { online: true, ts: serverTimestamp() });
    log('📲 الجهاز متصل وجاهز');

    window.addEventListener('beforeunload', () => {
      set(ref(db, 'camera/device'), { online: false });
    });
  </script>
</body>
</html>
